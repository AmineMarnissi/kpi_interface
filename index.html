<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MEL-T Factory Meeting Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            slate: { 950: '#03050f' },
            brand: {
              50:'#f0f4ff', 100:'#dce6ff', 200:'#b9cdff',
              300:'#85a5ff', 400:'#4d77ff', 500:'#2952ff',
              600:'#1432e0', 700:'#0e25b8', 800:'#0c1f95',
              900:'#0b1875', 950:'#060b40',
            },
            neon: { cyan:'#00d4ff', violet:'#a855f7', rose:'#ff2d6f', amber:'#fbbf24' }
          }
        }
      }
    };
  </script>
  <style>
    /* ── MODERN PALETTE ────────────────────────────── */
    :root {
      color-scheme: light dark;
      --p-50:#f0f4ff; --p-100:#dce6ff; --p-200:#b9cdff;
      --p-400:#4d77ff; --p-500:#2952ff; --p-600:#1432e0;
      --p-700:#0e25b8; --p-800:#0c1f95; --p-900:#0b1875;
      --neon-cyan:#00d4ff; --neon-violet:#a855f7;
      --neon-rose:#ff2d6f; --neon-amber:#fbbf24;
      --bg-dark:#03050f; --surface-dark:#080c1a;
      --card-dark:#0d1326; --border-dark:#1e2a4a;
      --text-muted-dark:#6b7fa3;
    }
    * { scrollbar-width: thin; scrollbar-color: #1e2a4a transparent; }
    body { min-height: 100vh; }

    /* Dark mode base */
    .dark body { background: var(--bg-dark); }

    /* Glassmorphism */
    .glass {
      background: rgba(8,12,26,.75);
      backdrop-filter: blur(16px);
      border: 1px solid rgba(78,110,255,.12);
    }

    /* Cards */
    .card { transition: transform .2s ease, box-shadow .2s ease, border-color .2s ease; }
    .card:hover { transform: translateY(-3px); box-shadow: 0 8px 32px rgba(41,82,255,.18); }

    /* Glow effects */
    .glow-blue  { box-shadow: 0 0 24px rgba(41,82,255,.25); }
    .glow-cyan  { box-shadow: 0 0 24px rgba(0,212,255,.2); }
    .glow-violet{ box-shadow: 0 0 24px rgba(168,85,247,.2); }

    /* Nav active */
    .nav-active {
      background: linear-gradient(90deg,rgba(41,82,255,.18),rgba(168,85,247,.08));
      color: #7aa3ff;
      border-left: 3px solid #4d77ff;
      box-shadow: inset 0 0 20px rgba(41,82,255,.06);
    }
    .dark .nav-active { background: linear-gradient(90deg,rgba(41,82,255,.2),rgba(168,85,247,.1)); }

    /* KPI card selected */
    .kpi-card-selected { outline: 2px solid rgba(77,119,255,.7); box-shadow: 0 0 16px rgba(41,82,255,.2); }

    /* Drag drop */
    .drop-active { border-color:#4d77ff!important; background:rgba(41,82,255,.08)!important; }

    /* Status dots */
    .status-dot { width:.55rem; height:.55rem; border-radius:9999px; display:inline-block; }

    /* Charts */
    .chart-box { position: relative; min-height: 300px; height: 320px; }
    .chart-box-sm { position: relative; min-height: 240px; height: 260px; }
    .sparkline { position: relative; height: 48px; }

    /* Scrollbars */
    .scrollbar-hidden::-webkit-scrollbar { display: none; }
    .scrollbar-hidden { -ms-overflow-style: none; scrollbar-width: none; }
    .custom-scrollbar::-webkit-scrollbar { width: 6px; height: 6px; }
    .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
    .custom-scrollbar::-webkit-scrollbar-thumb { background: #1e2a4a; border-radius: 4px; }
    .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #2d3f6e; }

    /* Matrix */
    .vertical-text-cell { height: 240px; vertical-align: bottom; padding-bottom: 12px; }
    .vertical-text { writing-mode: vertical-rl; transform: rotate(180deg); white-space: nowrap; font-size: 0.75rem; font-weight: 600; line-height: 1.1; margin: 0 auto; }
    .central-x-bg { background: linear-gradient(135deg,#fef9c3,#fde68a); position: relative; }

    /* Gradient text utility */
    .grad-text { background: linear-gradient(90deg,#4d77ff,#a855f7); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }

    /* Table sticky */
    .table-sticky {
      border-collapse: separate;
      border-spacing: 0;
      table-layout: auto;
    }
    .table-sticky th {
      position: sticky;
      top: 0;
      z-index: 5;
      background: inherit;
    }

    /* Animated gradient border */
    .gradient-border { position:relative; }
    .gradient-border::before {
      content:''; position:absolute; inset:-1px; border-radius:inherit; z-index:-1;
      background: linear-gradient(135deg,#4d77ff33,#a855f733,#4d77ff33);
    }

    @media print {
      aside, #top-actions, #filter-bar, footer { display:none!important; }
      main { padding:0!important; }
      .print-break { break-before:page; }
      body { background:white!important; color:black!important; }
    }
  </style>
</head>
<body class="bg-[#f0f4ff] dark:bg-[#03050f] text-slate-900 dark:text-slate-100 font-sans antialiased">

    </div>
  </header>

  <div class="flex min-h-[calc(100vh-69px)]">
    <aside class="hidden lg:flex w-72 shrink-0 sticky top-[69px] h-[calc(100vh-69px)] border-r border-slate-200/60 dark:border-[#1e2a4a] bg-white dark:bg-[#080c1a] flex-col p-4 overflow-y-auto">

      <section id="filter-bar" class="rounded-2xl border border-slate-200/70 dark:border-[#1e2a4a] bg-white dark:bg-[#0d1326] p-4 shadow-sm">

          <label id="filter-compare-label" class="text-xs font-bold text-slate-500">Comparaison

      <section id="page-content" class="space-y-6"></section>

  <footer class="border-t border-slate-200/70 dark:border-[#1e2a4a] bg-white dark:bg-[#0d1326] px-6 py-4 text-[11px] text-slate-500 flex flex-col md:flex-row gap-2 justify-between">

<script>
(() => {
  'use strict';

  const PERIODS = [
    { key:'2024' },
    { key:'2025' },
    { key:'2025-06' },
    { key:'2026-01' },
    { key:'2026-02' },
    { key:'2026-03' },
    { key:'2026-04' },
    { key:'2026-05' },
    { key:'2026-06' }
  ];
  const PERIOD_LABELS = {
    fr: { '2024':'2024', '2025':'2025', '2025-06':'Juin 2025', '2026-01':'Jan 2026', '2026-02':'Fev 2026', '2026-03':'Mar 2026', '2026-04':'Avr 2026', '2026-05':'Mai 2026', '2026-06':'Juin 2026' },

  };
  const SITES = ['Safety','Leather','D|AIR','MEL-T'];
  const PROCESS_LIST = [
    { id:'strategy', get label(){ return t('p_strategy'); }, get short(){ return t('ps_strategy'); }, icon:'compass', color:'violet', get description(){ return t('pd_strategy'); } },
    { id:'production', get label(){ return t('p_production'); }, get short(){ return t('ps_production'); }, icon:'factory', color:'indigo', get description(){ return t('pd_production'); } },
    { id:'planning', get label(){ return t('p_planning'); }, get short(){ return t('ps_planning'); }, icon:'truck', color:'cyan', get description(){ return t('pd_planning'); } },
    { id:'qhse', get label(){ return t('p_qhse'); }, get short(){ return t('ps_qhse'); }, icon:'shield-check', color:'emerald', get description(){ return t('pd_qhse'); } },
    { id:'people', get label(){ return t('p_people'); }, get short(){ return t('ps_people'); }, icon:'users', color:'amber', get description(){ return t('pd_people'); } },
    { id:'finance', get label(){ return t('p_finance'); }, get short(){ return t('ps_finance'); }, icon:'landmark', color:'rose', get description(){ return t('pd_finance'); } },

  const KPI_CATALOG = [
    // Strategy
    kpi('strategy-score','strategy','Score global MEL-T','Score composite des KPI disponibles et pondérés.','score','higher',['score global','overall score'],['Summary','Overview'],['MEL-T']),

    kpi('critical-kpis','strategy','KPI critiques','Nombre de KPI classés critiques.','KPI','lower',['critical kpi','kpi critiques'],['Summary'],['MEL-T']),

    // Production

    kpi('productivity','production','Productivité en pièces/heure','Nombre de pièces produites par heure directe.','p/h','higher',['productivity','productivite','productivité'],['Efficiency'],SITES),
    kpi('production-volume','production','Volume de production','Volume réellement produit sur la période.','pcs','higher',['production volume','volume production','output'],['Volume','Production','Efficiency'],SITES),

    // Planning
    kpi('otif','planning','OTIF','Commandes livrées à temps et en totalité.','%','higher',['otif','on time in full'],['Delivery'],SITES),
    kpi('production-lead-time','planning','Lead Time de production','Durée interne de fabrication.','jours','lower',['production lead time','lead time production'],['Delivery'],SITES),
    kpi('lead-time','planning','Lead Time End-to-End','Durée totale entre la demande et la livraison.','jours','lower',['lead time global','end to end lead time','lead time'],['Delivery'],SITES),

    kpi('pnc','qhse','PNC','Nombre de produits ou processus non conformes.','PNC','lower',['pnc','non conformity','non conformite','non-conformité'],['Quality','QHSE'],SITES),
    kpi('customer-complaints','qhse','Réclamations clients','Nombre de réclamations enregistrées.','réclamations','lower',['customer complaints','reclamations clients','réclamations clients','complaints'],['Quality','QHSE'],SITES),
    kpi('accidents','qhse','Accidents','Nombre total d’accidents enregistrés.','accidents','lower',['accidents','accident'],['Safety','QHSE'],SITES),
    kpi('tf1','qhse','TF1','Taux de fréquence des accidents avec arrêt.','TF','lower',['tf1','frequency rate'],['Safety','QHSE'],SITES),
    kpi('tg','qhse','TG','Taux de gravité des accidents.','TG','lower',['tg','severity rate'],['Safety','QHSE'],SITES),
    kpi('electricity','qhse','Consommation électrique','Consommation d’électricité sur la période.','kWh','lower',['electricity consumption','consommation electrique','consommation électrique'],['QHSE','Energy'],SITES),
    kpi('water','qhse','Consommation d’eau','Consommation d’eau sur la période.','m³','lower',['water consumption','consommation eau','consommation d eau'],['QHSE','Environment'],SITES),

    window.safety_register = [];
  window.qhse_objectifs = [];
  window.hoshin_database = [];
  window.hoshin_process_blueprint = [];
  window.qualipro_usage_details = null;

  const DATA_VERSION = '2026-07-16-1';
  const withDataVersion = (path) => `${path}?v=${encodeURIComponent(DATA_VERSION)}`;

  async function loadDataFromDataFolder() {
    try {
      // 1. Fetch targets
      try {
        const resTargets = await fetch(withDataVersion('data/smi_targets.json'));
        if (resTargets.ok) {
          const targetsData = await resTargets.json();
          targetsData.forEach(t => {
            // Find corresponding KPI id
            const kpiIdMap = {
              'CC': 'customer-complaints',
              'IE': 'electric-intensity',
              'CQR': 'customer-quality',
              'QUALIPRO': 'qualipro-completion',
              'Water': 'water'
            };
            const kid = kpiIdMap[t.acronyme];
            if (kid) {
              if (!STATIC_DATA[kid]) {
                STATIC_DATA[kid] = { values: {}, targets: {}, source: 'data/smi_targets.json' };
              }
              if (!STATIC_DATA[kid].targets) STATIC_DATA[kid].targets = {};

              // Populate targets for all sites
              let val = 0.0;
              if (kid === 'customer-quality') val = 99.5;
              else {
                const match = String(t.cible).match(/[\d.]+/);
                if (match) val = parseFloat(match[0]);
              }
              
              ['Safety', 'Leather', 'D|AIR', 'Warehouse', 'MEL-T'].forEach(s => {
                STATIC_DATA[kid].targets[s] = { "default": val };
              });
            }
          });
        }
      } catch (err) {
        console.warn("Could not load targets:", err);
      }

      // 2. Fetch metrics
      try {
        const resMetrics = await fetch(withDataVersion('data/kpi_metrics.json'));
        if (resMetrics.ok) {
          const metricsData = await resMetrics.json();
          const siteMap = {
            'Safety': 'Safety', 'Leather': 'Leather', 'D|AIR': 'D|AIR', 'Warehouse': 'Warehouse', 'MEL-T': 'MEL-T',
            'safety': 'Safety', 'leather': 'Leather', 'dair': 'D|AIR', 'warehouse': 'Warehouse', 'melt': 'MEL-T'
          };
          metricsData.forEach(r => {
            const siteLabel = r.site_label || r.site;
            const mappedSite = siteMap[siteLabel];
            const periode = r.periode;
            const indicator = r.indicateur;
            const val = r.valeur;
            
            if (!mappedSite || val === null || val === undefined) return;
            
            let key = null;
            if (indicator === 'Accidents du travail') key = 'accidents';
            else if (indicator === 'Accidents avec arrêt') key = 'lost-time-accidents';
            else if (indicator === 'Jours perdus') key = 'lost-days';
            else if (indicator === 'Taux de fréquence (TF)') key = 'tf1';
            else if (indicator === 'Taux de gravité (TG)') key = 'tg';
            else if (indicator === "Consommation d'électricité") key = 'electricity';
            else if (indicator === "Émission d'électricité" || (indicator === "Émissions totales CO₂" && mappedSite === "MEL-T")) key = 'co2';
            else if (indicator === "Intensité électrique (IE)" || (indicator === "Intensité électrique Globale" && mappedSite === "MEL-T")) key = 'electric-intensity';
            else if (indicator === "Consommation Gasoil" || indicator === "Consommation Gasoil sans soufre") key = 'diesel';
            else if (indicator === "TEP" || indicator === "TEP totale") key = 'tep-total';
            else if (indicator === "Consommation d'eau") key = 'water';
            else if (indicator === "Consommation L/P/J") key = 'water-intensity';
            else if (indicator === "produits_non_conformes") key = 'pnc';
            else if (indicator === "taux_exploitation_qualipro") key = 'qualipro-completion';
            else if (indicator === "Customer Claims" || indicator === "reclamations_client") key = 'customer-complaints';
            else if (indicator === "Customer Quality Rate" || indicator === "customer_quality_rate") key = 'customer-quality';
            
            if (key) {
              if (!STATIC_DATA[key]) {
                STATIC_DATA[key] = { values: {}, targets: {}, source: 'data/kpi_metrics.json' };
              }
              if (!STATIC_DATA[key].values) STATIC_DATA[key].values = {};
              if (!STATIC_DATA[key].values[mappedSite]) STATIC_DATA[key].values[mappedSite] = {};
              STATIC_DATA[key].values[mappedSite][periode] = Number(val);
            }
          });
        }
      } catch (err) {
        console.warn("Could not load metrics:", err);
      }

      // 2.5 Fetch Production JSON
      try {
        const resProd = await fetch(withDataVersion('data/processus_production_global.json'));
        if (resProd.ok) {
          const prodData = await resProd.json();
          const periodMap = {
            'juin_2026': '2026-06', 'mai_2026': '2026-05', 'juin_2025': '2025-06',
            'ytd_2026': 'ytd_2026', 'pytd_2025': 'pytd_2025'
          };
          const kpiMap = {
            'Efficacité opérationnelle': 'operational-efficiency',
            'Productivité en pièces/heure': 'productivity',
            'Volume de production': 'production-volume',
            'Taux de défaut FQC': 'fqc',
            'Taux de défaut OQC': 'oqc',
            'Ratio du volume de production': 'volume-ratio',
            'Taux d’utilisation de la capacité': 'capacity-utilization',
            'Ratio d’efficacité': 'efficiency-ratio'
          };
          Object.entries(prodData.sites || {}).forEach(([bu, kpiList]) => {
            const siteLabel = bu === "SAFETY" ? "Safety" : bu === "LEATHER" ? "Leather" : bu === "D|AIR" ? "D|AIR" : bu === "MEL-T" ? "MEL-T" : null;
            if (!siteLabel) return;
            
            kpiList.forEach(kpiObj => {
              const staticKey = kpiMap[kpiObj.nom];
              if (!staticKey) return;
              
              if (!STATIC_DATA[staticKey]) STATIC_DATA[staticKey] = { values: {}, targets: {} };
              if (!STATIC_DATA[staticKey].values) STATIC_DATA[staticKey].values = {};
              if (!STATIC_DATA[staticKey].values[siteLabel]) STATIC_DATA[staticKey].values[siteLabel] = {};
              if (kpiObj.details) {
                STATIC_DATA[staticKey].details = STATIC_DATA[staticKey].details || {};
                STATIC_DATA[staticKey].details[siteLabel] = kpiObj.details;
              }
              if (staticKey.startsWith('capex')) {
                STATIC_DATA[staticKey].source = '202606_Factory_Meeting_KPIs -RECAP_v2.xlsx · Capex';
              }
              
              Object.entries(kpiObj.valeurs || {}).forEach(([rawPeriod, val]) => {
                if (val === null) return;
                if (rawPeriod === 'cible') {
                  STATIC_DATA[staticKey].targets = STATIC_DATA[staticKey].targets || {};
                  STATIC_DATA[staticKey].targets[siteLabel] = { default: Number(val) };
                } else {
                  // Mappage avancé pour couvrir les périodes du dashboard
                  if (rawPeriod === 'juin_2026') STATIC_DATA[staticKey].values[siteLabel]['2026-06'] = Number(val);
                  if (rawPeriod === 'mai_2026') STATIC_DATA[staticKey].values[siteLabel]['2026-05'] = Number(val);
                  if (rawPeriod === 'juin_2025') STATIC_DATA[staticKey].values[siteLabel]['2025-06'] = Number(val);
                  if (rawPeriod === 'pytd_2025') STATIC_DATA[staticKey].values[siteLabel]['2025'] = Number(val);
                  if (rawPeriod === 'ytd_2026') {
                      // Pour les ratios qui n'ont que du YTD, on l'injecte dans le mois en cours pour qu'il s'affiche !
                      if (!STATIC_DATA[staticKey].values[siteLabel]['2026-06']) {
                          STATIC_DATA[staticKey].values[siteLabel]['2026-06'] = Number(val);
                      }
                      STATIC_DATA[staticKey].values[siteLabel]['2026'] = Number(val);
                  }
                }
              });
            });
          });
        }

            if (!siteLabel) return;

                } else {
                  if (rawPeriod === 'juin_2026') STATIC_DATA[staticKey].values[siteLabel]['2026-06'] = Number(val);
                  if (rawPeriod === 'mai_2026') STATIC_DATA[staticKey].values[siteLabel]['2026-05'] = Number(val);
                  if (rawPeriod === 'juin_2025') STATIC_DATA[staticKey].values[siteLabel]['2025-06'] = Number(val);
                  if (rawPeriod === 'pytd_2025') STATIC_DATA[staticKey].values[siteLabel]['2025'] = Number(val);
                  if (rawPeriod === 'ytd_2026') {
                      if (!STATIC_DATA[staticKey].values[siteLabel]['2026-06']) STATIC_DATA[staticKey].values[siteLabel]['2026-06'] = Number(val);
                      STATIC_DATA[staticKey].values[siteLabel]['2026'] = Number(val);

              });
            });
          });
        }
      } catch (err) {
        console.warn("Could not load logistics metrics:", err);
      }

      // 2.7 Fetch RH JSON
      try {
        const resRh = await fetch(withDataVersion('data/processus_rh_global.json'));
        if (resRh.ok) {
          const rhData = await resRh.json();
          const kpiMap = {
            'Effectif total': 'headcount-total',
            'Taux de turnover': 'turnover',
            'Taux d’absentéisme': 'absenteeism',
            'Réalisation du budget d’effectif': 'headcount-vs-budget',
            'Ratio employés directs/indirects': 'direct-indirect-ratio',
            'Heures travaillées': 'worked-hours',
            'Taux d’heures supplémentaires': 'overtime-rate',
            'Taux de réalisation du plan de formation': 'training-completion',
            'Heures de formation par salarié': 'training-hours-per-employee'
          };
          
          Object.entries(rhData.sites || {}).forEach(([bu, kpiList]) => {
            const siteLabel = bu === "SAFETY" ? "Safety" : bu === "LEATHER" ? "Leather" : bu === "D|AIR" ? "D|AIR" : bu === "MEL-T" ? "MEL-T" : null;
            if (!siteLabel) return;
            
            kpiList.forEach(kpiObj => {
              const staticKey = kpiMap[kpiObj.nom];
              if (!staticKey) return;
              
              if (!STATIC_DATA[staticKey]) STATIC_DATA[staticKey] = { values: {}, targets: {} };
              if (!STATIC_DATA[staticKey].values) STATIC_DATA[staticKey].values = {};
              if (!STATIC_DATA[staticKey].values[siteLabel]) STATIC_DATA[staticKey].values[siteLabel] = {};
              
              Object.entries(kpiObj.valeurs || {}).forEach(([rawPeriod, val]) => {
                if (val === null) return;
                if (rawPeriod === 'cible') {
                  STATIC_DATA[staticKey].targets = STATIC_DATA[staticKey].targets || {};
                  STATIC_DATA[staticKey].targets[siteLabel] = { default: Number(val) };
                } else {
                  if (rawPeriod === 'juin_2026') STATIC_DATA[staticKey].values[siteLabel]['2026-06'] = Number(val);
                  if (rawPeriod === 'mai_2026') STATIC_DATA[staticKey].values[siteLabel]['2026-05'] = Number(val);
                  if (rawPeriod === 'juin_2025') STATIC_DATA[staticKey].values[siteLabel]['2025-06'] = Number(val);
                  if (rawPeriod === 'pytd_2025') STATIC_DATA[staticKey].values[siteLabel]['2025'] = Number(val);
                  if (rawPeriod === 'ytd_2026') {
                      if (!STATIC_DATA[staticKey].values[siteLabel]['2026-06']) STATIC_DATA[staticKey].values[siteLabel]['2026-06'] = Number(val);
                      STATIC_DATA[staticKey].values[siteLabel]['2026'] = Number(val);
                  }
                }
              });
            });
          });
        }
      } catch (err) {
        console.warn("Could not load RH metrics:", err);
      }

      // 2.8 Fetch Finance JSON
      try {
        const resFin = await fetch(withDataVersion('data/processus_finance_global.json'));
        if (resFin.ok) {
          const finData = await resFin.json();
          const kpiMap = {
            'Valeur des rebuts matière': 'scrap-cost',
            'Coût total de maintenance': 'maintenance-cost',
            'Coût de maintenance par heure directe': 'maintenance-cost-hour',
            'CAPEX réalisé': 'capex-realized',
            'CAPEX approuvé': 'capex-approved',
            'CAPEX total actuel': 'capex-total',
            'Taux de consommation du budget CAPEX': 'capex-consumption-rate',
            'Répartition du CAPEX par catégorie': 'capex-breakdown'
          };
          
          Object.entries(finData.sites || {}).forEach(([bu, kpiList]) => {
            const siteLabel = bu === "SAFETY" ? "Safety" : bu === "LEATHER" ? "Leather" : bu === "D|AIR" ? "D|AIR" : bu === "MEL-T" ? "MEL-T" : null;
            if (!siteLabel) return;
            
            kpiList.forEach(kpiObj => {
              const staticKey = kpiMap[kpiObj.nom];
              if (!staticKey) return;
              
              if (!STATIC_DATA[staticKey]) STATIC_DATA[staticKey] = { values: {}, targets: {} };
              if (!STATIC_DATA[staticKey].values) STATIC_DATA[staticKey].values = {};
              if (!STATIC_DATA[staticKey].values[siteLabel]) STATIC_DATA[staticKey].values[siteLabel] = {};
              if (kpiObj.details) {
                STATIC_DATA[staticKey].details = STATIC_DATA[staticKey].details || {};
                STATIC_DATA[staticKey].details[siteLabel] = kpiObj.details;
              }
              if (staticKey.startsWith('capex')) {
                STATIC_DATA[staticKey].source = '202606_Factory_Meeting_KPIs -RECAP_v2.xlsx · Capex';
              }
              
              Object.entries(kpiObj.valeurs || {}).forEach(([rawPeriod, val]) => {
                if (val === null) return;
                if (rawPeriod === 'cible') {
                  STATIC_DATA[staticKey].targets = STATIC_DATA[staticKey].targets || {};
                  STATIC_DATA[staticKey].targets[siteLabel] = { default: Number(val) };
                } else {
                  if (rawPeriod === 'juin_2026') STATIC_DATA[staticKey].values[siteLabel]['2026-06'] = Number(val);
                  if (rawPeriod === 'mai_2026') STATIC_DATA[staticKey].values[siteLabel]['2026-05'] = Number(val);
                  if (rawPeriod === 'juin_2025') STATIC_DATA[staticKey].values[siteLabel]['2025-06'] = Number(val);
                  if (rawPeriod === 'pytd_2025') STATIC_DATA[staticKey].values[siteLabel]['2025'] = Number(val);
                  if (rawPeriod === 'ytd_2026') {
                      if (!STATIC_DATA[staticKey].values[siteLabel]['2026-06']) STATIC_DATA[staticKey].values[siteLabel]['2026-06'] = Number(val);
                      STATIC_DATA[staticKey].values[siteLabel]['2026'] = Number(val);
                  }
                }
              });
            });
          });
        }
      } catch (err) {
        console.warn("Could not load finance metrics:", err);
      }


      // 3. Fetch safety register
      try {
        const resSafety = await fetch(withDataVersion('data/safety_register.json'));
        if (resSafety.ok) {
          window.safety_register = await resSafety.json();
        }
      } catch (err) {
        console.warn("Could not load safety register:", err);
      }

      // 4. Fetch Hoshin content
      try {
        const resHoshin = await fetch(withDataVersion('data/hoshin_content.json'));
        if (resHoshin.ok) {
          const hoshinContent = await resHoshin.json();
          window.hoshin_database = hoshinContent.leaders || [];
          window.hoshin_process_blueprint = hoshinContent.processBlueprint || [];
          if (hoshinContent.activeLeader) activeHoshinLeader = hoshinContent.activeLeader;
          if (hoshinContent.activeProcess) activeHoshinProcess = hoshinContent.activeProcess;
        }
      } catch (err) {
        console.warn("Could not load Hoshin content:", err);
      }

      // 5. Fetch Objectives
      try {
        const resObj = await fetch(withDataVersion('data/qhse_objectifs.json'));
        if (resObj.ok) {
          window.qhse_objectifs = await resObj.json();
        }
      } catch (err) {
        console.warn("Could not load objectives:", err);
      }

      // 6. Fetch Qualipro user details from Excel extraction
      try {
        const resQualipro = await fetch(withDataVersion('data/qualipro_usage_details.json'));
        if (resQualipro.ok) {
          window.qualipro_usage_details = await resQualipro.json();
          const totalRates = window.qualipro_usage_details?.totals?.rates || {};
          if (STATIC_DATA['qualipro-completion']) {
            STATIC_DATA['qualipro-completion'].source = 'QHSE KPI 2026.xlsx · KPI Qualipro';
            STATIC_DATA['qualipro-completion'].values = STATIC_DATA['qualipro-completion'].values || {};
            STATIC_DATA['qualipro-completion'].values['MEL-T'] = STATIC_DATA['qualipro-completion'].values['MEL-T'] || {};
            Object.entries(totalRates).forEach(([period, value]) => {
              STATIC_DATA['qualipro-completion'].values['MEL-T'][period] = Number(value);
            });
          }
        }
      } catch (err) {
        console.warn("Could not load Qualipro user details:", err);
      }

      toast("🟢 Données JSON chargées en direct de data/");
      return true;
    } catch (e) {
      console.warn("Erreur globale lors de la synchronisation du dossier data/", e);
      toast("🟡 Données internes de secours actives");
      return false;
    }
  }

function applyStaticData(){
    state.kpis.forEach(k=>{
      const d=STATIC_DATA[k.id];
      if(!d) return;
      k.values=d.values||{};
      k.targets=d.targets||{};
      k.details=d.details||{};
      k.source={sheet:d.source,row:null};
      k.quality='mapped';
    });
  }

  function bindEvents(){
    document.addEventListener('click', e => {
      const nav = e.target.closest('[data-nav]'); if(nav){ navigate(nav.dataset.nav); return; }
      const card = e.target.closest('[data-kpi-id]'); if(card){ openKpi(card.dataset.kpiId); return; }
      const proc = e.target.closest('[data-open-process]'); if(proc){ navigate('process:'+proc.dataset.openProcess); return; }
      const site = e.target.closest('[data-site-quick]'); if(site){ state.site=site.dataset.siteQuick; $('#site-filter').value=state.site; render(); }
    });
    $('#theme-toggle').addEventListener('click',()=>{ document.documentElement.classList.toggle('dark'); renderChartsOnly(); lucide.createIcons(); });
    $('#print-btn').addEventListener('click',()=>window.print());
    $('#site-filter').addEventListener('change',e=>{state.site=e.target.value;render();});
    $('#period-filter').addEventListener('change',e=>{state.period=e.target.value;render();});
    $('#compare-filter').addEventListener('change',e=>{state.compare=e.target.value;render();});
    $('#status-filter').addEventListener('change',e=>{state.status=e.target.value;render();});
    $('#kpi-search').addEventListener('input',e=>{state.search=e.target.value;render();});
  }

  function navigate(route){
    if(route.startsWith('process:')){ state.page='process'; state.activeProcess=route.split(':')[1]; }
    else state.page=route;
    render(); window.scrollTo({top:0,behavior:'smooth'});
  }

  function render(){
    updateNav(); updateDataMeta(); destroyCharts();
    const showHeader = state.page !== 'overview' && state.page !== 'hoshin' && !(state.page === 'process' && state.activeProcess === 'strategy');

    document.getElementById('filter-bar').style.display = showHeader ? '' : 'none';
    if(state.page==='overview') renderOverview();
    else if(state.page==='hoshin') renderHoshin();
    else renderProcess(state.activeProcess);
    lucide.createIcons();
    requestAnimationFrame(renderChartsOnly);
  }

    $$('.mobile-nav-btn').forEach(b=>{ const active=b.dataset.nav===key; b.classList.toggle('bg-[#2952ff]',active); b.classList.toggle('text-white',active); });

  function hoshinKpiBindings(row, process) {
    const explicit = (row.realityKpis || []).map(id => state.kpis.find(k => k.id === id)).filter(Boolean);
    if (explicit.length) return explicit;

    const kpiCode = String(row.kpiId || '').match(/K\d+/i)?.[0]?.toUpperCase() || '';
    const key = `${process} ${row.kpiId || ''} ${row.kpi || ''}`.toLowerCase();
    const codeMap = {
      K1: ['maintenance-cost-hour', 'maintenance-cost'],
      K2: ['electricity', 'electric-intensity', 'co2', 'water'],
      K3: ['productivity', 'operational-efficiency', 'production-volume'],
      K4: ['training-completion', 'training-hours-per-employee'],
      K5: ['fqc', 'oqc', 'qualipro-completion', 'customer-quality', 'pnc'],
      K6: ['otif', 'production-lead-time', 'lead-time', 'service-level'],
      K7: ['training-completion', 'training-hours-per-employee'],
      K8: ['turnover', 'absenteeism'],
      K9: ['tf1', 'tg', 'lost-time-accidents', 'lost-days']
    };

    const candidates = [...(codeMap[kpiCode] || [])];
    if (!candidates.length) {
      if (key.includes('k3') || key.includes('oee') || key.includes('productiv')) candidates.push('productivity', 'operational-efficiency', 'production-volume');
      if (key.includes('k4') || key.includes('polyval') || key.includes('skill')) candidates.push('training-completion', 'training-hours-per-employee');
      if (key.includes('k6') || key.includes('otif') || key.includes('lead time')) candidates.push('otif', 'production-lead-time', 'lead-time', 'service-level');
      if (key.includes('k7') || key.includes('formation') || key.includes('etcr')) candidates.push('training-completion', 'training-hours-per-employee');
      if (key.includes('k8') || key.includes('turnover') || key.includes('absent')) candidates.push('turnover', 'absenteeism');
      if (key.includes('k5') || key.includes('audit') || key.includes('dhu')) candidates.push('fqc', 'oqc', 'qualipro-completion', 'customer-quality', 'pnc');
      if (key.includes('k2') || key.includes('co₂') || key.includes('co2') || key.includes('energy') || key.includes('ec,')) candidates.push('electricity', 'electric-intensity', 'co2', 'water');
      if (key.includes('k9') || key.includes('accident') || key.includes('fr,') || key.includes('tf1')) candidates.push('tf1', 'tg', 'lost-time-accidents', 'lost-days');
      if (key.includes('k1') || key.includes('mch') || key.includes('bcr')) candidates.push('maintenance-cost-hour', 'maintenance-cost');
    }

    return [...new Map(candidates.map(id => [id, state.kpis.find(k => k.id === id)])).values()].filter(Boolean);
  }

  function stripLeadingCode(text, code) {
    const raw = String(text || '').trim();
    const normalizedCode = String(code || '').trim();
    if (!raw || !normalizedCode) return raw;
    const escaped = normalizedCode.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
    return raw.replace(new RegExp('^' + escaped + '\\s*[-:.]?\\s*', 'i'), '').trim();
  }
  function formatHoshinLabel(code, text, fallback) {
    const cleanText = stripLeadingCode(text, code);
    if (code && cleanText) return `${code} - ${cleanText}`;
    return code || cleanText || fallback || '—';
  }
  function worstStatus(statuses) {
    if (statuses.includes('red')) return 'red';
    if (statuses.includes('orange')) return 'orange';
    if (statuses.includes('green')) return 'green';
    return 'gray';
  }

  function hoshinReality(row, process) {
    if (!row.kpiId) return {items:[], status:'gray', label:'KPI non renseigné', mappedCount:0};
    const bindings = hoshinKpiBindings(row, process);
    if (!bindings.length) return {items:[], status:'gray', label:'Données terrain non mappées', mappedCount:0};
    const items = bindings.map(k => {
      const site = resolveSite(k);
      const value = getValue(k, site, state.period);
      const target = getTarget(k, site, state.period);
      const status = statusOf(k, site, state.period);
      const gap = value !== null && target !== null ? value - target : null;
      return {kpi:k, site, value, target, gap, status, label:statusLabel(status)};
    });
    const mappedItems = items.filter(item => item.value !== null || item.target !== null);
    const status = worstStatus(mappedItems.map(item => item.status));
    const label = mappedItems.length ? `${mappedItems.length} KPI réel(s)` : 'Données terrain non disponibles';
    return {items, status, label, mappedCount:mappedItems.length};
  }

    if (!real.items.length) return `<div class="text-xs text-slate-500">${real.label}</div>`;

      const target = item.target !== null ? displayValue(item.target, item.kpi.unit) : 'N/A';
      const gap = item.gap !== null ? signed(item.gap, item.kpi.unit) : 'N/A';
      return `<div class="rounded-xl border border-slate-200/80 dark:border-slate-800 px-3 py-2 ${compact ? 'text-[11px]' : 'text-xs'}"><div class="flex items-center justify-between gap-2"><span class="font-bold text-slate-800 dark:text-slate-200">${item.kpi.name}</span><span class="px-2 py-1 rounded-full text-[9px] font-black ${statusClass(item.status)}">${item.label}</span></div><div class="mt-1 text-slate-500 dark:text-slate-400">Terrain ${value} · Cible ${target} · Ecart ${gap}</div></div>`;
    }).join('')}</div>`;
  }


  function extractCodeNumber(value, prefix) {
    const match = String(value || '').match(new RegExp(`^${prefix}(\\d+)$`, 'i'));
    return match ? Number(match[1]) : Number.MAX_SAFE_INTEGER;
  }

  function compareInitiatives(a, b) {
    return extractCodeNumber(a, 'I') - extractCodeNumber(b, 'I');
  }

  function compareObjectives(a, b) {
    return extractCodeNumber(a, 'A') - extractCodeNumber(b, 'A');
  }

  function compareAxes(a, b) {
    return extractCodeNumber(a, 'S') - extractCodeNumber(b, 'S');
  }

  function openHoshinRowModal(rowKey) {
    const processes = window.hoshin_process_blueprint || [];
    const allRows = processes.flatMap(p => p.rows.map((r, index) => ({...r, rowKey:`${p.process}::${index}::${r.axis || ''}::${r.objectiveId || ''}::${r.initiativeId || ''}::${r.kpiId || ''}`, process:p.process, pilot:p.pilot, theme:p.theme})));
    const row = allRows.find(r => r.rowKey === rowKey);
    if (!row) return;
    const real = hoshinReality(row, row.process);
    $('#modal-eyebrow').textContent = `${row.process} · ${row.axis || 'Sans axe'} · ${row.objectiveId || '—'}`;

      function collectStatsV2() {
  const axes = [];
  const objectives = [];
  const initiatives = [];
  const actorRelations = [];
  const kpiRelations = [];

  Object.entries(DATA_V2).forEach(([axisLabel, axis]) => {
    axes.push({ label: axisLabel, count: axis.count });

    Object.entries(axis.objectives).forEach(([objectiveLabel, objective]) => {
      objectives.push({
        label: objectiveLabel,
        axis: axisLabel,
        count: objective.count
      });

      Object.entries(objective.initiatives).forEach(([initiativeLabel, initiative]) => {
        initiatives.push({
          label: initiativeLabel,
          axis: axisLabel,
          objective: objectiveLabel,
          count: initiative.count
        });

        Object.entries(initiative.actors).forEach(([actorLabel, actor]) => {
          actorRelations.push({
            actor: actorLabel,
            axis: axisLabel,
            objective: objectiveLabel,
            initiative: initiativeLabel,
            count: actor.count
          });

          actor.kpis.forEach(kpi => {
            kpiRelations.push({
              kpi: kpi.label,
              actor: actorLabel,
              axis: axisLabel,
              objective: objectiveLabel,
              initiative: initiativeLabel,
              count: kpi.count
            });
          });
        });
      });
    });
  });

  return { axes, objectives, initiatives, actorRelations, kpiRelations };
}

function totalsV2() {
  const s = collectStatsV2();
  return {
    axes: new Set(s.axes.map(x=>x.label)).size,
    objectives: new Set(s.objectives.map(x=>x.label)).size,
    initiatives: new Set(s.initiatives.map(x=>x.label)).size,
    actors: new Set(s.actorRelations.map(x=>x.actor)).size,
    kpis: new Set(s.kpiRelations.map(x=>x.kpi)).size
  };
}

function nodeV2(level,label,count,childrenHtml='') {
  const hasChildren = !!childrenHtml;
  return `<div class="v2-node v2-level-${level}" data-text="${escapeAttrV2(label.toLowerCase())}">
    <div class="v2-row">
      <button class="v2-toggle" type="button" ${hasChildren ? 'aria-expanded="false"' : 'disabled aria-hidden="true"'} onclick="toggleNodeV2(this)"></button>
      <div class="v2-label">${escapeHtmlV2(label)}${level==='actor' ? '<span class="v2-actor-badge">Acteur</span>' : ''}${level==='kpi' ? '<span class="v2-kpi-badge">KPI</span>' : ''}</div>
      <div class="v2-count">${count ?? ''}</div>
    </div>
    ${hasChildren ? `<div class="v2-children">${childrenHtml}</div>` : ''}
  </div>`;
}

function buildTreeV2() {
  let out='';
  Object.entries(DATA_V2).forEach(([axis,a])=>{
    let objectives='';
    Object.entries(a.objectives).forEach(([obj,o])=>{
      let initiatives='';
      Object.entries(o.initiatives).forEach(([init,i])=>{
        let actors='';
        Object.entries(i.actors).forEach(([actor,ac])=>{
          const kpis = ac.kpis.map(k=>nodeV2('kpi',k.label,k.count)).join('');
          actors += nodeV2('actor',actor,ac.count,kpis);
        });
        initiatives += nodeV2('initiative',init,i.count,actors);
      });
      objectives += nodeV2('objective',obj,o.count,initiatives);
    });
    out += nodeV2('axis',axis,a.count,objectives);
  });
  document.getElementById('v2-tree').innerHTML = out;
}

function toggleNodeV2(btn) {
  const n=btn.closest('.v2-node');
  n.classList.toggle('v2-open');
  btn.setAttribute('aria-expanded', n.classList.contains('v2-open') ? 'true' : 'false');
}
function openAllV2() {
  document.querySelectorAll('.v2-node:has(.v2-children)').forEach(n=>n.classList.add('v2-open'));
  document.querySelectorAll('.v2-toggle:not(:disabled)').forEach(b=>b.setAttribute('aria-expanded','true'));
}
function closeAllV2() {
  document.querySelectorAll('.v2-node').forEach(n=>n.classList.remove('v2-open'));
  document.querySelectorAll('.v2-toggle:not(:disabled)').forEach(b=>b.setAttribute('aria-expanded','false'));
}
function escapeHtmlV2(s) {
  return String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[c]));
}
function escapeAttrV2(s) { return escapeHtmlV2(s); }

function applySearchV2(q) {
  q=q.trim().toLowerCase();
  const nodes=[...document.querySelectorAll('.v2-node')];
  if(!q) {
    nodes.forEach(n=>n.classList.remove('v2-hidden-search'));
    return;
  }
  nodes.forEach(n=>n.classList.add('v2-hidden-search'));
  nodes.forEach(n=>{
    if((n.dataset.text||'').includes(q)) {
      n.classList.remove('v2-hidden-search');
      let p=n.parentElement?.closest('.v2-node');
      while(p) {
        p.classList.remove('v2-hidden-search');
        p.classList.add('v2-open');
        const b=p.querySelector(':scope > .v2-row > .v2-toggle');
        if(b) b.setAttribute('aria-expanded','true');
        p=p.parentElement?.closest('.v2-node');
      }
      n.querySelectorAll('.v2-node').forEach(c=>c.classList.remove('v2-hidden-search'));
    }
  });
}

            const lang = matrixData.lang;

            if (trans) return trans;
            if (type === 'owners') {
                return item[lang] || matrixTranslations['owners']?.[item.id]?.fr || item.name || '';

            return item[lang] || matrixTranslations[type]?.[item.id]?.fr || item['fr'] || item['it_en'] || '';

        // Export des données sous forme de fichier JSON
        function exportData() {

            const downloadAnchor = document.createElement('a');
            downloadAnchor.setAttribute("href", dataStr);

            downloadAnchor.click();
            downloadAnchor.remove();

        // Gestionnaire du cycle de corrélation
        function toggleCorrelation(key) {
            const current = matrixData.correlations[key] || 0;
            const next = (current + 1) % 5; // Rotation : 0 -> 1 -> 2 -> 3 -> 4 -> 0
            if (next === 0) {
                delete matrixData.correlations[key];
            } else {
                matrixData.correlations[key] = next;
            }
            localStorage.setItem('hoshin_correlations', JSON.stringify(matrixData.correlations));
            renderMatrix();
            calculateHealth();
        }

        // Création d'une cellule de corrélation interactive
        function createCorrelationCell(key, value, extraClasses = "") {
            const td = document.createElement('td');
            td.className = `border border-slate-300 text-center cursor-pointer transition-all hover:bg-indigo-50/50 w-8 h-8 select-none p-0 text-sm ${extraClasses}`;
            td.onclick = () => toggleCorrelation(key);
            
            let marker = "";
            let colorClass = "";

            if (value === 1) { // Forte
                marker = "●";
                colorClass = "text-indigo-600 font-bold text-lg";
            } else if (value === 2) { // Moyenne
                marker = "○";
                colorClass = "text-[#4d77ff] font-bold text-lg";
            } else if (value === 3) { // Faible
                marker = "✕";
                colorClass = "text-slate-400 font-extrabold text-xs";
            } else if (value === 4) { // Autre
                marker = "★";
                colorClass = "text-amber-500 font-bold text-xs";
            } else {
                // Rendu d'une icône "+" subtile au survol
                td.classList.add("group");
                td.innerHTML = `<span class="opacity-0 group-hover:opacity-100 text-slate-300 font-bold transition-opacity">+</span>`;
                return td;
            }

            td.innerHTML = `<span class="${colorClass}">${marker}</span>`;
            return td;
        }

        // Sélection d'un nœud de texte pour édition
        function selectItem(type, id) {
            let item = null;
            if (type === 'strategic') item = matrixData.strategic.find(x => x.id === id);
            else if (type === 'annual') item = matrixData.annual.find(x => x.id === id);
            else if (type === 'initiative') item = matrixData.initiatives.find(x => x.id === id);
            else if (type === 'kpi') item = matrixData.kpis.find(x => x.id === id);
            else if (type === 'owner') item = matrixData.owners.find(x => x.id === id);

            if (!item) return;

            selectedItem = { type, id, ref: item };

            // Mise à jour de l'UI de l'éditeur
            document.getElementById('editor-empty-state').classList.add('hidden');
            const form = document.getElementById('editor-form');
            form.classList.remove('hidden');

            document.getElementById('editor-item-type').innerText = type;
            document.getElementById('editor-item-code').innerText = id;
            
            const textarea = document.getElementById('editor-input');
            textarea.value = type === 'owner' ? (item.name || '') : getItemText(item, type === 'initiative' ? 'initiatives' : type + (type === 'kpi' ? 's' : ''));

            // Gestion de la catégorie pour les initiatives
            const catContainer = document.getElementById('editor-category-container');
            if (type === 'initiative') {
                catContainer.classList.remove('hidden');
                document.getElementById('editor-category-select').value = item.category;
            } else {
                catContainer.classList.add('hidden');
            }

            // Rafraîchir pour surligner visuellement l'élément sélectionné
            renderMatrix();
        }

            selectedItem = null;
            document.getElementById('editor-empty-state').classList.remove('hidden');
            document.getElementById('editor-form').classList.add('hidden');
            renderMatrix();
        }

            if (!selectedItem) return;
            const newText = document.getElementById('editor-input').value;
            if (selectedItem.type === 'owner') {
                selectedItem.ref.name = newText;
            } else {
                selectedItem.ref[matrixData.lang] = newText;

            if (!selectedItem || selectedItem.type !== 'initiative') return;

        // Analyse en temps réel du taux de couverture opérationnelle
        function calculateHealth() {
            const numS = matrixData.strategic.length;
            const numI = matrixData.initiatives.length;
            const numOW = matrixData.owners.length;

            let linkedS = 0;
            let linkedI = 0;
            let linkedOW = 0;

            // 1. Couverture des Objectifs Stratégiques (S) -> Doivent avoir un lien avec un Objectif Annuel (O)
            matrixData.strategic.forEach(s => {
                let isLinked = false;
                matrixData.annual.forEach(o => {
                    if (matrixData.correlations[`${s.id}_${o.id}`]) isLinked = true;
                });
                if (isLinked) linkedS++;
            });

            // 2. Lien Initiatives (I) -> KPIs
            matrixData.initiatives.forEach(i => {
                let isLinked = false;
                matrixData.kpis.forEach(k => {
                    if (matrixData.correlations[`${i.id}_${k.id}`]) isLinked = true;
                });
                if (isLinked) linkedI++;
            });

            // 3. Assignation des KPIs aux Responsables (OW)
            matrixData.owners.forEach(ow => {
                let isLinked = false;
                matrixData.kpis.forEach(k => {
                    if (matrixData.correlations[`${k.id}_${ow.id}`]) isLinked = true;
                });
                if (isLinked) linkedOW++;
            });

            const percentS = Math.round((linkedS / numS) * 100);
            const percentI = Math.round((linkedI / numI) * 100);
            const percentOW = Math.round((linkedOW / numOW) * 100);

            // Mise à jour graphique des barres de progression
            updateProgressBar('coverage-s-percent', 'coverage-s-bar', percentS);
            updateProgressBar('coverage-i-percent', 'coverage-i-bar', percentI);
            updateProgressBar('coverage-ow-percent', 'coverage-ow-bar', percentOW);
        }

        function updateProgressBar(textId, barId, percent) {
            const textEl = document.getElementById(textId);
            const barEl = document.getElementById(barId);
            if(textEl) textEl.innerText = `${percent}%`;
            if(barEl) barEl.style.width = `${percent}%`;
        }

  let siteLang = 'fr'; // langue active du site

  function t(key) {
    let lang = siteLang;
    if (lang === 'it_en') lang = 'it';
    const val = (I18N[lang] || I18N['fr'])[key] || (I18N['fr'])[key];
    if (val) return val;
    // Fallback to GRH_TRANS
    if (typeof GRH_TRANS !== 'undefined') {
      const gVal = (GRH_TRANS[lang] || GRH_TRANS['fr'])?.[key];
      if (gVal) return gVal;
    }
    return key;
  }

  function getFilterSiteOptions() {
    return [
      ['Safety', 'Safety'],
      ['Leather', 'Leather'],
      ['D|AIR', 'D|AIR'],
      ['MEL-T', 'MEL-T global']
    ].map(([value, label]) => `<option value="${value}">${label}</option>`).join('');
  }

  function getPeriodOptionsHtml(includeAll=false, includeTarget=false) {
    const options = [];
    if (includeAll) options.push(`<option value="ALL">${t('compare_all')}</option>`);
    PERIODS.slice().reverse().forEach(period => options.push(`<option value="${period.key}">${periodLabel(period.key)}</option>`));
    if (includeTarget) options.push(`<option value="TARGET">${t('compare_target')}</option>`);
    return options.join('');
  }

  function getStatusOptionsHtml() {
    return [
      ['ALL', t('status_all')],
      ['green', t('atteint')],
      ['orange', t('status_watch')],
      ['red', t('critique')],
      ['gray', t('status_gray')]
    ].map(([value, label]) => `<option value="${value}">${label}</option>`).join('');
  }

  function refreshStaticTexts() {
    const setText = (id, value) => { const el = document.getElementById(id); if (el) el.textContent = value; };
    setText('side-data-quality', t('data_quality'));
    setText('side-loaded-label', t('kpi_loaded'));
    setText('side-missing-label', t('kpi_na'));
    setText('side-source-label', t('source_label'));
    setText('footer-credits', t('footer_credits'));
    setText('footer-stack', t('footer_stack'));
    [['filter-site-label', t('filter_site')], ['filter-period-label', t('filter_period')], ['filter-compare-label', t('filter_compare')], ['filter-status-label', t('filter_status')], ['filter-search-label', t('filter_search')]].forEach(([id, value]) => {
      const el = document.getElementById(id);
      if (el && el.firstChild) el.firstChild.nodeValue = value;
    });
    const search = document.getElementById('kpi-search');
    if (search) search.placeholder = t('filter_search_placeholder');
    const siteFilter = document.getElementById('site-filter');
    if (siteFilter) { const current = siteFilter.value || state.site; siteFilter.innerHTML = getFilterSiteOptions(); siteFilter.value = current; }
    const periodFilter = document.getElementById('period-filter');
    if (periodFilter) { const current = periodFilter.value || state.period; periodFilter.innerHTML = getPeriodOptionsHtml(); periodFilter.value = current; }
    const compareFilter = document.getElementById('compare-filter');
    if (compareFilter) { const current = compareFilter.value || state.compare; compareFilter.innerHTML = getPeriodOptionsHtml(true, true); compareFilter.value = current; }
    const statusFilter = document.getElementById('status-filter');
    if (statusFilter) { const current = statusFilter.value || state.status; statusFilter.innerHTML = getStatusOptionsHtml(); statusFilter.value = current; }
  }

  // Processus multilingues
  function getProcessList() {
    const pk = { strategy:'strategy', production:'production', planning:'planning', qhse:'qhse', people:'people', finance:'finance' };
    return [
      { id:'strategy', label:t('p_strategy'), short:t('ps_strategy'), icon:'compass', color:'violet', description:t('pd_strategy') },
      { id:'production', label:t('p_production'), short:t('ps_production'), icon:'factory', color:'indigo', description:t('pd_production') },
      { id:'planning', label:t('p_planning'), short:t('ps_planning'), icon:'truck', color:'cyan', description:t('pd_planning') },
      { id:'qhse', label:t('p_qhse'), short:t('ps_qhse'), icon:'shield-check', color:'emerald', description:t('pd_qhse') },
      { id:'people', label:t('p_people'), short:t('ps_people'), icon:'users', color:'amber', description:t('pd_people') },
      { id:'finance', label:t('p_finance'), short:t('ps_finance'), icon:'landmark', color:'rose', description:t('pd_finance') },
    ];
  }

  function setSiteLang(lang) {
    // Map IT button to 'it', AR to 'ar', EN to 'en', FR to 'fr'
    const map = { it_en: 'it', it: 'it', fr: 'fr', en: 'en', ar: 'ar' };
    const normalizedLang = map[lang] || lang;
    const matrixLang = normalizedLang === 'it' ? 'it_en' : normalizedLang;
    siteLang = normalizedLang;
    // Sync matrix lang
    if (typeof matrixData !== 'undefined') {
      matrixData.lang = matrixLang;
      if (typeof updateLangButtons === 'function') updateLangButtons();
      if (typeof renderMatrix === 'function' && document.getElementById('matrix-table-body')) renderMatrix();
    }
    // Apply document language and direction
    document.documentElement.lang = normalizedLang;
    document.documentElement.dir = normalizedLang === 'ar' ? 'rtl' : 'ltr';
    // Re-render current page
    render();
    // Update lang button styles
    ['ar','fr','it','en'].forEach(l => {
      const btn = document.getElementById('lang-btn-' + (l === 'it' ? 'it' : l));
      if (!btn) return;
      const isActive = siteLang === l || (l === 'it' && siteLang === 'it');
      btn.className = isActive
        ? 'lang-btn px-2.5 py-1.5 rounded-lg text-xs font-bold transition-all bg-[#2952ff] text-white shadow'
        : 'lang-btn px-2.5 py-1.5 rounded-lg text-xs font-bold transition-all text-slate-700 dark:text-slate-300 hover:bg-slate-200 dark:hover:bg-[#1432e0]/30';
    });
    // Update static header labels
    const pBtn = document.getElementById('hdr-print');
    const dBadge = document.getElementById('hdr-data');
    if (pBtn) pBtn.textContent = t('btn_print');
    if (dBadge) dBadge.textContent = t('btn_data');
    refreshStaticTexts();
    lucide.createIcons();
  }
  window.setSiteLang = setSiteLang;
  window.setMatrixLang = (lang) => setSiteLang(lang);
  // ===================== FIN I18N =====================


  refreshStaticTexts();
  init();
})();
